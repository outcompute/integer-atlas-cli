name: Release

# On a version tag, build the cgo (embedded-DuckDB) binary for each target on a
# native runner, then publish all binaries + a SHA256SUMS file to the release.
# cgo can't be cross-compiled cleanly, so each target builds where it runs.
# Linux builds run inside a glibc-2.28 (manylinux_2_28) container so the binaries
# run on older distros too (Ubuntu 18.04+, Amazon Linux 2/2023, RHEL/Alma 8+).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs-on: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
          - target: linux-arm64
            runs-on: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux_2_28_aarch64
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: CGO_ENABLED=1 go build -trimpath -buildvcs=false -o "integer-atlas-${{ matrix.target }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: integer-atlas-${{ matrix.target }}
          path: integer-atlas-${{ matrix.target }}

  build-macos:
    # Build both macOS targets on the Apple-Silicon runner: arm64 natively and
    # amd64 via clang cross-compile (go-duckdb ships a darwin-amd64 static lib),
    # so we don't depend on the scarce/slow macos-13 Intel runners.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build darwin-arm64 (native)
        run: CGO_ENABLED=1 go build -trimpath -buildvcs=false -o integer-atlas-darwin-arm64 .
      - name: Build darwin-amd64 (cross)
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" go build -trimpath -buildvcs=false -o integer-atlas-darwin-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: integer-atlas-darwin
          path: integer-atlas-darwin-*

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          chmod +x integer-atlas-*
          sha256sum integer-atlas-* | tee SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/integer-atlas-*
            dist/SHA256SUMS
